---
- name: Install Datadog Agent
  hosts: webservers
  become: yes
  tasks:
    - name: Import Datadog agent role from collection
      import_role:
        name: datadog.dd.agent

    - name: Configure HTTP check for Redmine
      copy:
        dest: /etc/datadog-agent/conf.d/http_check.d/redmine.yaml
        content: |
          instances:
            - name: Redmine
              url: "http://localhost:{{ redmine_port }}"
              timeout: 5
              collect_response_time: true
              tags:
                - "app:redmine"
                - "env:production"
        owner: dd-agent
        group: dd-agent
        mode: 0644
      notify: restart datadog-agent

  handlers:
    - name: restart datadog-agent
      systemd:
        name: datadog-agent
        state: restarted
