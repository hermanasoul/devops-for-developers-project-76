---
- name: Configure servers
  hosts: all
  gather_facts: false
  tasks:
    - name: Install Python3, pip, six, and apt
      ansible.builtin.raw: |
        apt-get update
        apt-get install -y python3 python3-pip python3-six python3-apt
      become: true
      changed_when: false

    - name: Install Docker using official script
      ansible.builtin.raw: curl -fsSL https://get.docker.com -o get-docker.sh && sh get-docker.sh
      become: true
      changed_when: false

    - name: Add ubuntu user to docker group
      ansible.builtin.raw: usermod -aG docker ubuntu
      become: true
      changed_when: false

    - name: Ensure docker service is started
      ansible.builtin.raw: service docker start || true
      become: true
      changed_when: false

    - name: Install docker Python module via apt
      ansible.builtin.raw: apt-get install -y python3-docker
      become: true
      changed_when: false